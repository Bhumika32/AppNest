{% extends "base.html" %}
{% block title %}BMI Calculator | AppNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="auth-card">
      <h3 class="fw-bold mb-2">BMI Calculator ⚖️</h3>
      <p class="text-white-50 mb-4">
        Enter your height and weight to calculate your BMI.
      </p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Weight (kg)</label>
          <input class="form-control" type="number" step="0.1" name="weight" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Height (cm)</label>
          <input class="form-control" type="number" step="0.1" name="height" required />
        </div>

        <button class="btn btn-primary w-100" type="submit">Calculate BMI</button>
      </form>

      {% if bmi %}
      <hr class="my-4 opacity-25" />
      <h5 class="fw-bold">Result</h5>
      <p class="mb-1">✅ BMI: <b>{{ bmi }}</b></p>
      <p class="mb-0">📌 Category: <b>{{ category }}</b></p>
      {% endif %}

    </div>
  </div>
</div>
{% endblock %}
