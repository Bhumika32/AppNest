{% extends "base.html" %}
{% block title %}All Tools | AppNest{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold mb-1">All Tools</h2>
    <p class="text-white-50 mb-0">Explore all tools available in AppNest.</p>
  </div>

  <a class="btn btn-outline-light" href="{{ url_for('main.dashboard') }}">
    Back to Dashboard
  </a>
</div>

<div class="row g-3">
  {% for tool in tools %}
  <div class="col-12 col-md-6 col-lg-4">
    <div class="auth-card h-100">
      <div class="d-flex align-items-center gap-2 mb-2">
        <div style="font-size: 28px;">{{ tool.icon }}</div>
        <h5 class="fw-bold mb-0">{{ tool.name }}</h5>
      </div>

      <p class="text-white-50">{{ tool.description }}</p>

      <a href="{{ tool.url }}" class="btn btn-primary w-100">Open</a>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
