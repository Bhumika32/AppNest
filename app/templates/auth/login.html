<!--
app/templates/auth/login.html

Professional login UI for AppNest.
Includes:
- Username
- Password
- Forgot Password link (we will activate in next step)
-->

{% extends "base.html" %}
{% block title %}Login | AppNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="auth-card">
      <h3 class="fw-bold mb-1">Welcome Back 👋</h3>
      <p class="auth-subtitle mb-4">Login to access your AppNest dashboard.</p>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username" required />
        </div>

        <div class="mb-2">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <!-- We'll connect this route in next step -->
          <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">Forgot password?</a>

        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>

      <p class="mt-3 mb-0 text-center">
        Don’t have an account?
        <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
