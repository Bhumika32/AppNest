{% extends "base.html" %}
{% block title %}Forgot Password | AppNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="auth-card">
      <h3 class="fw-bold mb-1">Forgot Password 🔐</h3>
      <p class="auth-subtitle mb-4">Enter your email to receive a reset OTP.</p>

      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required />
        </div>

        <button class="btn btn-warning w-100" type="submit">Send OTP</button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
