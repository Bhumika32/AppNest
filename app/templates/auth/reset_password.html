{% extends "base.html" %}
{% block title %}Reset Password | AppNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="auth-card">
      <h3 class="fw-bold mb-1">Reset Password ✅</h3>
      <p class="auth-subtitle mb-4">Create a new password for your account.</p>

      <form method="POST" action="{{ url_for('auth.reset_password') }}">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input class="form-control" type="password" name="new_password" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input class="form-control" type="password" name="confirm_password" required />
        </div>

        <button class="btn btn-success w-100" type="submit">Update Password</button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
